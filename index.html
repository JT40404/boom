<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERO DAY KEY HUNT // v0.8.7</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #000;
            color: #00ff41;
            font-family: 'VT323', monospace;
            overflow: hidden;
            height: 100vh;
        }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        .header {
            background: rgba(0, 20, 0, 0.9);
            border-bottom: 2px solid #ff0044;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.45rem;
            pointer-events: all;
            box-shadow: 0 0 20px #ff0044;
        }
        .wallet-header {
            color: #ff4444;
            text-shadow: 0 0 15px #ff4444;
            font-size: 1.5rem;
        }
        .wallet-header a {
            color: inherit;
            text-decoration: none;
            transition: all 0.3s;
        }
        .wallet-header a:hover {
            color: #ffff00;
            text-shadow: 0 0 20px #ffff00;
        }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(13px, -1px) skew(-13deg); }
        }
        
        .terminal {
            position: absolute;
            top: 70px; left: 50%;
            transform: translateX(-50%);
            width: 820px; height: 520px;
            background: rgba(0, 15, 0, 0.95);
            border: 3px solid #00ff41;
            box-shadow: 0 0 30px #00ff41;
            z-index: 10;
            pointer-events: all;
            display: flex; flex-direction: column;
        }
        .term-header {
            background: #001100;
            padding: 5px 15px;
            border-bottom: 2px solid #00ff41;
            display: flex; justify-content: space-between;
        }
        .term-body {
            flex: 1; padding: 15px; overflow-y: auto;
            font-size: 1.3rem; line-height: 1.4;
        }
        .input-line { display: flex; margin-top: 5px; }
        input {
            background: transparent; border: none; color: #00ff41;
            font-family: inherit; font-size: inherit; flex: 1; outline: none;
        }
        
        .key-inventory {
            position: absolute; bottom: 20px; right: 30px;
            background: rgba(0,20,0,0.9); border: 2px solid #00ff41;
            padding: 15px; width: 240px; z-index: 20;
        }
        
        .donate-box {
            position: absolute;
            bottom: 20px;
            left: 30px;
            background: rgba(0, 10, 0, 0.96);
            border: 2px solid #ffaa00;
            padding: 16px;
            width: 240px;
            z-index: 20;
            box-shadow: 0 0 25px #ffaa00;
            text-align: center;
        }
        .donate-title {
            color: #ffaa00;
            font-size: 1.35rem;
            margin-bottom: 12px;
            text-shadow: 0 0 10px #ffaa00;
        }
        .qr-container {
            background: #0a0a0a;
            padding: 10px;
            border: 2px solid #00ff41;
            display: inline-block;
            box-shadow: inset 0 0 12px rgba(0,255,65,0.4);
        }
        .qr-container img {
            width: 170px;
            height: 170px;
            image-rendering: crisp-edges;
        }
        
        .scanline {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0,255,65,0.05) 50%);
            background-size: 100% 6px;
            animation: scan 4s linear infinite;
            z-index: 3; pointer-events: none;
        }
        @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
        
        .success {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 255, 65, 0.25);
            display: none; 
            align-items: center; 
            justify-content: center;
            flex-direction: column; 
            z-index: 100; 
            color: #00ff41;
            text-shadow: 0 0 50px #00ff41; 
            font-size: 3.8rem;
            pointer-events: all;
        }
        .private-key {
            margin-top: 40px;
            font-size: 1.55rem;
            background: #001100;
            padding: 20px 35px;
            border: 3px solid #ffff00;
            color: #ffff00;
            word-break: break-all;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 0 40px #ffff00;
            line-height: 1.5;
            cursor: pointer;
            transition: all 0.3s;
        }
        .private-key:hover {
            background: #002200;
            box-shadow: 0 0 50px #ffff00;
            transform: scale(1.02);
        }
        .copied-notice {
            margin-top: 15px;
            font-size: 1.6rem;
            color: #00ff00;
            opacity: 0;
            transition: opacity 0.4s;
        }
    </style>
</head>
